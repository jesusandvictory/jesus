// [스크립트 부분만 발췌 - 기존 코드의 <script>~</script> 전체를 이걸로 덮어쓰세요]

<script>
    let googleWebAppUrl = "https://script.google.com/macros/s/AKfycbzm8BP4YbBrbumbfoIgmPicHMwgKNkGAGYQVaYTbZSvX6Nboa0eliQ5J-rgT2tvoqE/exec";
    let db = { stocks: ['j스타홀딩스', '삼성전자'], writers: ['주식왕'], records: [] };

    // 1. 웹사이트 열자마자 구글 시트에서 데이터 가져오기 (실시간 동기화)
    function fetchData() {
        fetch(googleWebAppUrl) // 데이터를 불러오는 주소 (구글 시트 연동)
            .then(res => res.json())
            .then(data => {
                db.records = data; // 구글 시트 데이터를 가져와서 화면에 세팅
                renderTable();
            });
    }

    function init() {
        fetchData(); // 데이터 불러오기 실행
        renderOptions();
        $('.search-select').select2({ placeholder: "선택 또는 타이핑 검색..." });
    }

    // 2. 저장할 때 구글 시트로 보내기
    function saveRecord(e) {
        e.preventDefault();
        const newRecord = {
            date: document.getElementById('date').value,
            stock: document.getElementById('stockName').value,
            writer: document.getElementById('writerName').value,
            content: document.getElementById('content').value
        };

        fetch(googleWebAppUrl, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(newRecord)
        }).then(() => {
            alert('저장 완료! 페이지를 새로고침하면 연동됩니다.');
            fetchData(); // 저장 직후 다시 불러오기
        });
    }

    $(document).ready(function() { init(); });
</script>
