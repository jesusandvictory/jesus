<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주식 및 토론 기록 관리 시스템</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f5f6f8; margin: 0; padding: 20px; }
        .container { max-width: 850px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #ddd; padding-bottom: 10px; }
        .tab-btn { padding: 10px 20px; border: 1px solid #ddd; background: #f8f9fa; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .tab-btn.active { background: #007bff; color: white; border-color: #007bff; }
        .btn-submit { width: 100%; padding: 12px; background: #2ecc71; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f8f9fa; }
        .btn-delete { background: #ff4d4d; color: white; border: none; padding: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>📈 주식 및 토론 기록 관리</h1>
    <div class="tabs">
        <button class="tab-btn active" id="tab-input" onclick="showSection('input')">📝 기록 입력</button>
        <button class="tab-btn" id="tab-search" onclick="showSection('search')">🔍 조건별 찾기</button>
    </div>

    <div id="input-section">
        <input type="date" id="date" style="width:100%; margin-bottom:10px;">
        <select id="stockName" class="search-select" style="width:100%;"></select>
        <select id="writerName" class="search-select" style="width:100%;"></select>
        <textarea id="content" placeholder="내용" style="width:100%; height:100px; margin-top:10px;"></textarea>
        <button class="btn-submit" onclick="saveRecord()">저장하기</button>
    </div>

    <div id="search-section" style="display:none;">
        <select id="filterStock" class="search-select" onchange="renderTable()" style="width:100%;"></select>
        <select id="filterWriter" class="search-select" onchange="renderTable()" style="width:100%;"></select>
    </div>

    <table>
        <thead><tr><th>날짜</th><th>종목</th><th>닉네임</th><th>내용</th><th>관리</th></tr></thead>
        <tbody id="recordTableBody"></tbody>
    </table>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('stockDB')) || { stocks: ['삼성전자', 'SK하이닉스'], writers: ['주식왕'], records: [] };

    function init() {
        localStorage.setItem('stockDB', JSON.stringify(db));
        renderSelects();
        renderTable();
        $('.search-select').select2({ placeholder: "검색 및 선택" });
    }

    function renderSelects() {
        ['stockName', 'filterStock'].forEach(id => {
            document.getElementById(id).innerHTML = '<option value="">전체/선택</option>' + db.stocks.map(s => `<option value="${s}">${s}</option>`).join('');
        });
        ['writerName', 'filterWriter'].forEach(id => {
            document.getElementById(id).innerHTML = '<option value="">전체/선택</option>' + db.writers.map(w => `<option value="${w}">${w}</option>`).join('');
        });
    }

    function showSection(type) {
        document.getElementById('input-section').style.display = (type === 'input') ? 'block' : 'none';
        document.getElementById('search-section').style.display = (type === 'search') ? 'block' : 'none';
        document.getElementById('tab-input').className = (type === 'input') ? 'tab-btn active' : 'tab-btn';
        document.getElementById('tab-search').className = (type === 'search') ? 'tab-btn active' : 'tab-btn';
    }

    function saveRecord() {
        const newRecord = {
            id: Date.now(),
            date: document.getElementById('date').value,
            stock: document.getElementById('stockName').value,
            writer: document.getElementById('writerName').value,
            content: document.getElementById('content').value
        };
        db.records.unshift(newRecord);
        init();
        alert('저장 완료!');
    }

    function renderTable() {
        const fS = document.getElementById('filterStock').value;
        const fW = document.getElementById('filterWriter').value;
        const tbody = document.getElementById('recordTableBody');
        tbody.innerHTML = db.records.filter(r => 
            (fS === '' || r.stock === fS) && (fW === '' || r.writer === fW)
        ).map(r => `<tr><td>${r.date}</td><td>${r.stock}</td><td>${r.writer}</td><td>${r.content}</td><td><button class="btn-delete" onclick="del(${r.id})">삭제</button></td></tr>`).join('');
    }

    function del(id) {
        db.records = db.records.filter(r => r.id !== id);
        init();
    }

    $(document).ready(() => {
        document.getElementById('date').value = new Date().toISOString().substring(0, 10);
        init();
    });
</script>
</body>
</html>
