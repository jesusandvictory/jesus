<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주식 및 토론 기록 관리 시스템</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f5f6f8; margin: 0; padding: 20px; }
        .container { max-width: 850px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; border: 1px solid #ddd; background: #f8f9fa; cursor: pointer; }
        .tab-btn.active { background: #007bff; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f8f9fa; }
        .btn-submit { width: 100%; padding: 12px; background: #2ecc71; color: white; border: none; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h1>📈 주식 및 토론 기록 관리 시스템</h1>
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('all')">📝 기록 입력</button>
        <button class="tab-btn" onclick="switchTab('search')">🔍 조건별 찾기/필터</button>
    </div>
    
    <form id="recordForm" onsubmit="saveRecord(event)">
        <input type="date" id="date" required>
        <input type="text" id="stockName" placeholder="종목명" required>
        <input type="text" id="writerName" placeholder="닉네임" required>
        <textarea id="content" placeholder="내용" required style="width:100%; margin-top:10px;"></textarea>
        <button type="submit" id="submitBtn" class="btn-submit">저장하기</button>
    </form>

    <table>
        <thead><tr><th>날짜</th><th>종목명</th><th>닉네임</th><th>내용</th></tr></thead>
        <tbody id="recordTableBody"></tbody>
    </table>
</div>

<script>
    // 본인의 웹앱 주소를 넣으세요
    const googleWebAppUrl = "https://script.google.com/macros/s/AKfycbzm8BP4YbBrbumbfoIgmPicHMwgKNkGAGYQVaYTbZSvX6Nboa0eliQ5J-rgT2tvoqE/exec";
    let allRecords = [];

    function fetchData() {
        fetch(googleWebAppUrl)
            .then(res => res.json())
            .then(data => {
                allRecords = data;
                renderTable(allRecords);
            })
            .catch(err => console.error("데이터 로드 실패:", err));
    }

    function renderTable(data) {
        const tbody = document.getElementById('recordTableBody');
        tbody.innerHTML = '';
        data.forEach(r => {
            tbody.innerHTML += `<tr><td>${r.date}</td><td>${r.stock}</td><td>${r.writer}</td><td>${r.content}</td></tr>`;
        });
    }

    function saveRecord(e) {
        e.preventDefault();
        const data = {
            date: document.getElementById('date').value,
            stock: document.getElementById('stockName').value,
            writer: document.getElementById('writerName').value,
            content: document.getElementById('content').value
        };
        fetch(googleWebAppUrl, { method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" }, body: JSON.stringify(data) })
            .then(() => {
                alert('저장 성공!');
                fetchData(); // 저장 후 목록 새로고침
            });
    }

    $(document).ready(function() {
        document.getElementById('date').value = new Date().toISOString().substring(0, 10);
        fetchData(); // 페이지 접속 시 데이터 로드
    });
</script>
</body>
</html>
