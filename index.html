<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주식 및 토론 기록 관리 시스템 (구글 연동형)</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.5/xlsx.full.min.js"></script>
    
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f5f6f8; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 850px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; font-size: 24px; margin-bottom: 30px; color: #2c3e50; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #ddd; padding-bottom: 10px; }
        .tab-btn { padding: 10px 20px; border: 1px solid #ddd; background: #f8f9fa; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .tab-btn.active { background: #007bff; color: white; border-color: #007bff; }
        .form-group { margin-bottom: 15px; }
        .form-row { display: flex; gap: 15px; flex-wrap: wrap; }
        .form-row .form-group { flex: 1; min-width: 180px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; color: #495057; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        
        .select2-container--default .select2-selection--single { height: 40px; border: 1px solid #ccc; border-radius: 4px; padding-top: 5px; }
        .select2-container { width: 100% !important; }
        textarea { height: 100px; resize: none; margin-top: 5px; }
        
        .btn-submit { width: 100%; padding: 12px; background: #2ecc71; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-submit:hover { background: #27ae60; }
        .btn-submit:disabled { background: #95a5a6; cursor: not-allowed; }
        
        .base-setup { display: flex; gap: 20px; margin-top: 30px; padding-top: 20px; border-top: 1px dashed #ddd; }
        .setup-box { flex: 1; background: #fafafa; padding: 15px; border-radius: 6px; border: 1px solid #eee; }
        .tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
        .tag { background: #e8f4fd; color: #1d9bf0; padding: 5px 10px; border-radius: 15px; font-size: 12px; display: inline-flex; align-items: center; gap: 5px; }
        .tag .remove { cursor: pointer; color: #ff4d4d; font-weight: bold; }
        
        .action-buttons { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        .btn-excel { background-color: #217346; color: white; border: none; padding: 10px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .btn-print { background-color: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f8f9fa; }
        
        @media print {
            body { background: white; padding: 0; }
            .container { box-shadow: none; padding: 0; max-width: 100%; }
            .tabs, #input-section, #search-section, .action-buttons, th:last-child, td:last-child { display: none !important; }
            h1 { margin-top: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📈 주식 및 토론 기록 관리 시스템 (실시간 연동형)</h1>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('all')">📝 기록 입력</button>
        <button class="tab-btn" onclick="switchTab('search')">🔍 조건별 찾기/필터</button>
    </div>

    <div id="input-section">
        <h3>새 기록 추가</h3>
        <form id="recordForm" onsubmit="saveRecord(event)">
            <div class="form-row">
                <div class="form-group">
                    <label>날짜</label>
                    <input type="date" id="date" required>
                </div>
                <div class="form-group">
                    <label>종목명 (타이핑 검색 가능)</label>
                    <select id="stockName" class="search-select" required></select>
                </div>
                <div class="form-group">
                    <label>토론자 (타이핑 검색 가능)</label>
                    <select id="writerName" class="search-select" required></select>
                </div>
            </div>
            <div class="form-group" style="margin-top: 15px;">
                <label>토론 내용</label>
                <textarea id="content" placeholder="토론 내용이나 주식 기록을 입력하세요..." required></textarea>
            </div>
            <button type="submit" id="submitBtn" class="btn-submit">💾 클라우드(구글 시트)에 실시간 동기화 저장</button>
        </form>

        <div class="base-setup">
            <div class="setup-box">
                <label>🏢 종목 기본 리스트</label>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="newStock" placeholder="종목명" style="padding:8px;">
                    <button type="button" onclick="addBaseItem('stock')" style="background:#007bff; color:white; border:none; padding:0 12px; border-radius:4px; cursor:pointer; font-weight:bold;">추가</button>
                </div>
                <div class="tags" id="stockTags"></div>
            </div>
            <div class="setup-box">
                <label>👤 토론자 기본 리스트</label>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="newWriter" placeholder="닉네임" style="padding:8px;">
                    <button type="button" onclick="addBaseItem('writer')" style="background:#007bff; color:white; border:none; padding:0 12px; border-radius:4px; cursor:pointer; font-weight:bold;">추가</button>
                </div>
                <div class="tags" id="writerTags"></div>
            </div>
        </div>
    </div>

    <div id="search-section" style="display: none;">
        <h3>🔍 조건별 실시간 필터링</h3>
        <div class="form-row">
            <div class="form-group">
                <label>종목 선택</label>
                <select id="filterStock" class="search-select" onchange="renderTable()"></select>
            </div>
            <div class="form-group">
                <label>토론자 선택</label>
                <select id="filterWriter" class="search-select" onchange="renderTable()"></select>
            </div>
        </div>
    </div>

    <div class="action-buttons">
        <button class="btn-excel" onclick="exportToExcel()">Excel 다운로드</button>
        <button class="btn-print" onclick="window.print()">한글/PDF 인쇄하기</button>
    </div>

    <div class="list-section" style="margin-top: 15px;">
        <h3>📋 이번 기기에서 저장한 기록 목록 (최신순)</h3>
        <table>
            <thead>
                <tr>
                    <th>날짜</th>
                    <th>종목명</th>
                    <th>닉네임</th>
                    <th>내용</th>
                </tr>
            </thead>
            <tbody id="recordTableBody"></tbody>
        </table>
    </div>
</div>

<script>
    // ⚠️ [중요] 구글 스프레드시트 Apps Script에서 배포 후 발급받은 나만의 웹앱 주소를 아래 큰따옴표 안에 꼭 붙여넣으세요!
    let googleWebAppUrl = "여기에 구글 웹앱 URL 주소를 붙여넣으세요";

    let db = JSON.parse(localStorage.getItem('stockDB')) || { 
        stocks: ['j스타홀딩스', '삼성전자', 'SK하이닉스', '애스트로테크'], 
        writers: ['관대한불가사리', '주식왕'], 
        records: [] 
    };

    document.getElementById('date').value = new Date().toISOString().substring(0, 10);

    function init() {
        localStorage.setItem('stockDB', JSON.stringify(db));
        renderOptions();
        renderTable();
        $('.search-select').select2({ placeholder: "선택 또는 타이핑 검색..." });
    }

    function renderOptions() {
        const sOpt = document.getElementById('stockName');
        const wOpt = document.getElementById('writerName');
        const fStock = document.getElementById('filterStock');
        const fWriter = document.getElementById('filterWriter');
        const sTags = document.getElementById('stockTags');
        const wTags = document.getElementById('writerTags');

        sOpt.innerHTML = '<option value=""></option>'; 
        wOpt.innerHTML = '<option value=""></option>';
        fStock.innerHTML = '<option value="">전체 보기</option>';
        fWriter.innerHTML = '<option value="">전체 보기</option>';
        sTags.innerHTML = ''; wTags.innerHTML = '';

        db.stocks.forEach(s => {
            sOpt.innerHTML += `<option value="${s}">${s}</option>`;
            fStock.innerHTML += `<option value="${s}">${s}</option>`;
            sTags.innerHTML += `<span class="tag">${s}<span class="remove" onclick="removeBaseItem('stock','${s}')">×</span></span>`;
        });

        db.writers.forEach(w => {
            wOpt.innerHTML += `<option value="${w}">${w}</option>`;
            fWriter.innerHTML += `<option value="${w}">${w}</option>`;
            wTags.innerHTML += `<span class="tag">${w}<span class="remove" onclick="removeBaseItem('writer','${w}')">×</span></span>`;
        });
    }

    function saveRecord(e) {
        e.preventDefault();
        const stockVal = document.getElementById('stockName').value;
        const writerVal = document.getElementById('writerName').value;
        const submitBtn = document.getElementById('submitBtn');
        
        if(!stockVal || !writerVal) { alert('종목명과 토론자를 선택해 주세요!'); return; }
        if(googleWebAppUrl.includes("여기에")) { alert('구글 웹앱 주소(URL)가 설정되지 않았습니다. 코드를 확인해 주세요.'); return; }

        const newRecord = {
            date: document.getElementById('date').value,
            stock: stockVal,
            writer: writerVal,
            content: document.getElementById('content').value
        };

        submitBtn.disabled = true;
        submitBtn.innerText = "⏳ 구글 클라우드로 전송 중...";

        // 구글 서버로 실시간 다이렉트 전송 실행
        fetch(googleWebAppUrl, {
            method: "POST",
            mode: "no-cors", // 구글 보안 교차 오류 우회
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(newRecord)
        })
        .then(() => {
            // 이번 기기 화면 목록에도 실시간 누적 기록
            db.records.unshift(newRecord);
            document.getElementById('content').value = '';
            init();
            $('#stockName').val('').trigger('change');
            $('#writerName').val('').trigger('change');
            
            submitBtn.disabled = false;
            submitBtn.innerText = "💾 클라우드(구글 시트)에 실시간 동기화 저장";
            alert('구글 클라우드 시트 연동 및 저장 성공!');
        })
        .catch(err => {
            console.error(err);
            submitBtn.disabled = false;
            submitBtn.innerText = "💾 클라우드(구글 시트)에 실시간 동기화 저장";
            alert('인터넷 전송 실패! 주소 설정을 다시 확인해 주세요.');
        });
    }

    function renderTable() {
        const tbody = document.getElementById('recordTableBody');
        const fS = document.getElementById('filterStock').value;
        const fW = document.getElementById('filterWriter').value;
        tbody.innerHTML = '';

        if(db.records.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#999; padding:20px;">이번 기기에서 입력된 내역이 없습니다. (구글 시트 확인 필요)</td></tr>`;
            return;
        }

        db.records.forEach(r => {
            if((fS === '' || r.stock === fS) && (fW === '' || r.writer === fW)) {
                tbody.innerHTML += `
                    <tr>
                        <td>${r.date}</td>
                        <td><strong>${r.stock}</strong></td>
                        <td>${r.writer}</td>
                        <td>${r.content.replace(/\n/g, '<br>')}</td>
                    </tr>`;
            }
        });
    }

    function addBaseItem(type) {
        if(type === 'stock') {
            const val = document.getElementById('newStock').value.trim();
            if(val && !db.stocks.includes(val)) db.stocks.push(val);
            document.getElementById('newStock').value = '';
        } else {
            const val = document.getElementById('newWriter').value.trim();
            if(val && !db.writers.includes(val)) db.writers.push(val);
            document.getElementById('newWriter').value = '';
        }
        init();
    }

    function removeBaseItem(type, val) {
        if(confirm(`기준 리스트에서 [${val}] 항목을 제거할까요?`)) {
            if(type === 'stock') db.stocks = db.stocks.filter(item => item !== val);
            else db.writers = db.writers.filter(item => item !== val);
            init();
        }
    }

    function exportToExcel() {
        const rows = document.querySelectorAll("#recordTableBody tr");
        if (rows.length === 0 || rows[0].cells.length < 4) { alert('다운로드할 데이터가 없습니다.'); return; }
        const exportData = [];
        rows.forEach(row => {
            const cells = row.cells;
            if (cells.length >= 4) {
                exportData.push({
                    '날짜': cells[0].innerText,
                    '종목명': cells[1].innerText,
                    '닉네임': cells[2].innerText,
                    '토론내용': cells[3].innerText
                });
            }
        });
        const worksheet = XLSX.utils.json_to_sheet(exportData);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "필터기록목록");
        XLSX.writeFile(workbook, "주식_토론_필터_목록.xlsx");
    }

    $(document).ready(function() {
        init();
    });
</script>
</body>
</html>
